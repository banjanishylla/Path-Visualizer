<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PathViz — Path Finding Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#e0e0f0;font-family:'JetBrains Mono',monospace;min-height:100vh;overflow:hidden}
:root{
  --bg:#0a0a0f;--panel:#10101a;--border:#1e1e35;
  --cyan:#00f5ff;--pink:#ff2d78;--green:#00ff9d;--amber:#ffb800;--purple:#9b5de5;
  --node-bg:#13131f;--wall:#0d0d18;
  --text-dim:#4a4a6a;--text-mid:#8888aa;
}
#app{display:flex;flex-direction:column;height:100vh}
header{padding:10px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--panel)}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:2px;color:var(--cyan);text-transform:uppercase}
.logo span{color:var(--pink)}
.stats-row{display:flex;gap:20px;font-size:10px;color:var(--text-mid)}
.stat{display:flex;flex-direction:column;align-items:center;gap:2px}
.stat-val{font-size:16px;font-weight:700;color:var(--cyan);font-family:'Syne',sans-serif}
#stat-visited .stat-val{color:var(--pink)}
#stat-path .stat-val{color:var(--green)}
#stat-time .stat-val{color:var(--amber)}
.controls{padding:8px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--panel);flex-shrink:0}
.ctrl-group{display:flex;align-items:center;gap:6px}
.ctrl-label{font-size:9px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;white-space:nowrap}
select,button{font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 10px;border:1px solid var(--border);background:var(--node-bg);color:#cccce0;cursor:pointer;outline:none;transition:all .15s}
select:hover,select:focus{border-color:var(--cyan);color:var(--cyan)}
.btn-run{background:var(--cyan);color:#000;font-weight:700;border:none;letter-spacing:1px;padding:6px 18px;font-family:'Syne',sans-serif;font-size:12px}
.btn-run:hover{background:#00d4e0}
.btn-run:disabled{background:#1a3a3a;color:#2a5a5a;cursor:not-allowed}
.btn-clear{border-color:var(--pink);color:var(--pink)}
.btn-clear:hover{background:rgba(255,45,120,.1)}
.btn-maze{border-color:var(--purple);color:var(--purple)}
.btn-maze:hover{background:rgba(155,93,229,.1)}
.btn-reset{border-color:var(--text-dim);color:var(--text-dim)}
.btn-reset:hover{border-color:#fff;color:#fff}
.divider{width:1px;height:24px;background:var(--border)}
.legend{display:flex;gap:12px;margin-left:auto}
.leg-item{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--text-mid)}
.leg-dot{width:10px;height:10px;border-radius:2px}
#grid-wrap{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:12px;background:var(--bg)}
#grid{display:grid;gap:1px;background:var(--border);border:1px solid var(--border)}
.cell{background:var(--node-bg);cursor:pointer;transition:background .08s;position:relative}
.cell:hover{background:#1a1a2e}
.cell.wall{background:#08080f}
.cell.wall::after{content:'';position:absolute;inset:2px;background:rgba(255,45,120,.07)}
.cell.start{background:#001a20;cursor:default}
.cell.start::after{content:'';position:absolute;inset:0;background:radial-gradient(circle,rgba(0,245,255,.55) 0%,transparent 70%)}
.cell.end{background:#1a000d;cursor:default}
.cell.end::after{content:'';position:absolute;inset:0;background:radial-gradient(circle,rgba(255,45,120,.55) 0%,transparent 70%)}
.cell.visited{animation:visitAnim .3s ease forwards}
.cell.path{animation:pathAnim .2s ease forwards}
@keyframes visitAnim{0%{background:var(--node-bg)}50%{background:#0d1a2a}100%{background:#0a1520}}
@keyframes pathAnim{0%{background:#0a1520}100%{background:#001208;box-shadow:inset 0 0 6px rgba(0,255,157,.3)}}
.mode-info{font-size:10px;color:var(--text-dim)}
#mode-label{color:var(--amber)}
.help-tip{font-size:9px;color:var(--text-dim);letter-spacing:.5px}
</style>
</head>
<body>
<div id="app">
<header>
  <div class="logo">Path<span>.</span>viz</div>
  <div class="stats-row">
    <div class="stat" id="stat-visited"><span class="stat-val" id="v-count">0</span><span>visited</span></div>
    <div class="stat" id="stat-path"><span class="stat-val" id="p-count">0</span><span>path length</span></div>
    <div class="stat" id="stat-time"><span class="stat-val" id="t-val">0ms</span><span>compute time</span></div>
  </div>
</header>

<div class="controls">
  <div class="ctrl-group">
    <span class="ctrl-label">Algorithm</span>
    <select id="algo-sel">
      <option value="dijkstra">Dijkstra</option>
      <option value="astar">A* Search</option>
      <option value="bfs">BFS</option>
      <option value="dfs">DFS</option>
      <option value="greedy">Greedy BFS</option>
    </select>
  </div>
  <div class="divider"></div>
  <div class="ctrl-group">
    <span class="ctrl-label">Speed</span>
    <select id="speed-sel">
      <option value="5">Fastest</option>
      <option value="10">Fast</option>
      <option value="30" selected>Medium</option>
      <option value="80">Slow</option>
    </select>
  </div>
  <div class="divider"></div>
  <span class="help-tip">Click or drag grid to draw walls</span>
  <div class="divider"></div>
  <button class="btn-run" id="run-btn" onclick="runAlgo()">▶ RUN</button>
  <button class="btn-maze" onclick="generateMaze()">⊞ Maze</button>
  <button class="btn-clear" onclick="clearPath()">◌ Clear Path</button>
  <button class="btn-reset" onclick="resetGrid()">↺ Reset All</button>
  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:rgba(0,245,255,.5)"></div>Start</div>
    <div class="leg-item"><div class="leg-dot" style="background:rgba(255,45,120,.5)"></div>End</div>
    <div class="leg-item"><div class="leg-dot" style="background:#0a1520"></div>Visited</div>
    <div class="leg-item"><div class="leg-dot" style="background:#001208;box-shadow:inset 0 0 4px rgba(0,255,157,.3)"></div>Path</div>
    <div class="leg-item"><div class="leg-dot" style="background:#08080f"></div>Wall</div>
  </div>
</div>

<div id="grid-wrap"><div id="grid"></div></div>
</div>

<script>
const ROWS=22, COLS=52;
let grid=[], startNode=null, endNode=null, isRunning=false, mouseDown=false;

function initGrid(){
  const g=document.getElementById('grid');
  const wrap=document.getElementById('grid-wrap');
  const availW=wrap.clientWidth-24;
  const availH=wrap.clientHeight-24;
  const cw=Math.floor((availW-COLS)/COLS);
  const ch=Math.floor((availH-ROWS)/ROWS);
  const cs=Math.min(cw,ch,26);
  g.style.gridTemplateColumns=`repeat(${COLS},${cs}px)`;
  grid=[];
  g.innerHTML='';
  for(let r=0;r<ROWS;r++){
    grid[r]=[];
    for(let c=0;c<COLS;c++){
      const cell={r,c,wall:false,visited:false,dist:Infinity,prev:null,f:0,g:0,h:0,el:null};
      const el=document.createElement('div');
      el.className='cell';
      el.style.width=cs+'px';
      el.style.height=cs+'px';
      el.addEventListener('mousedown',e=>{e.preventDefault();mouseDown=true;handleCell(r,c)});
      el.addEventListener('mouseenter',()=>{if(mouseDown)handleCell(r,c)});
      cell.el=el;
      grid[r][c]=cell;
      g.appendChild(el);
    }
  }
  const sr=Math.floor(ROWS/2), sc=Math.floor(COLS/5);
  const er=Math.floor(ROWS/2), ec=Math.floor(COLS*4/5);
  setStart(sr,sc);
  setEnd(er,ec);
}

function handleCell(r,c){
  if(isRunning)return;
  const cell=grid[r][c];
  const isS=startNode&&startNode.r===r&&startNode.c===c;
  const isE=endNode&&endNode.r===r&&endNode.c===c;
  if(isS||isE)return;
  cell.wall=!cell.wall;
  cell.el.className='cell'+(cell.wall?' wall':'');
}

function setStart(r,c){
  if(startNode){startNode.el.className='cell'+(startNode.wall?' wall':'')}
  startNode=grid[r][c];
  startNode.el.className='cell start';
}
function setEnd(r,c){
  if(endNode){endNode.el.className='cell'+(endNode.wall?' wall':'')}
  endNode=grid[r][c];
  endNode.el.className='cell end';
}

function clearPath(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const cell=grid[r][c];
    cell.visited=false;cell.dist=Infinity;cell.prev=null;cell.f=0;cell.g=0;cell.h=0;
    if(!cell.wall)cell.el.className='cell';
  }
  if(startNode)startNode.el.className='cell start';
  if(endNode)endNode.el.className='cell end';
  setStats(0,0,'0ms');
}

function resetGrid(){
  isRunning=false;
  document.getElementById('run-btn').disabled=false;
  document.getElementById('run-btn').textContent='▶ RUN';
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const cell=grid[r][c];
    cell.wall=false;cell.visited=false;cell.dist=Infinity;cell.prev=null;cell.f=0;cell.g=0;cell.h=0;
    cell.el.className='cell';
  }
  const sr=Math.floor(ROWS/2),sc=Math.floor(COLS/5);
  const er=Math.floor(ROWS/2),ec=Math.floor(COLS*4/5);
  setStart(sr,sc);setEnd(er,ec);
  setStats(0,0,'0ms');
}

function setStats(v,p,t){
  document.getElementById('v-count').textContent=v;
  document.getElementById('p-count').textContent=p;
  document.getElementById('t-val').textContent=t;
}

function neighbors(r,c){
  return [[0,1],[1,0],[0,-1],[-1,0]]
    .map(([dr,dc])=>[r+dr,c+dc])
    .filter(([nr,nc])=>nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!grid[nr][nc].wall)
    .map(([nr,nc])=>grid[nr][nc]);
}
function heuristic(a,b){return Math.abs(a.r-b.r)+Math.abs(a.c-b.c)}

function delay(ms){return new Promise(res=>setTimeout(res,ms))}

async function runAlgo(){
  if(isRunning)return;
  clearPath();
  isRunning=true;
  const btn=document.getElementById('run-btn');
  btn.disabled=true;btn.textContent='⏳';
  const algo=document.getElementById('algo-sel').value;
  const speed=parseInt(document.getElementById('speed-sel').value);
  const t0=performance.now();
  let order=[],pathEnd=null;

  if(algo==='bfs'){
    const q=[startNode];startNode.visited=true;
    while(q.length){
      const cur=q.shift();order.push(cur);
      if(cur===endNode){pathEnd=cur;break}
      for(const nb of neighbors(cur.r,cur.c)){
        if(!nb.visited){nb.visited=true;nb.prev=cur;q.push(nb)}
      }
    }
  } else if(algo==='dfs'){
    const stack=[startNode];
    while(stack.length){
      const cur=stack.pop();if(cur.visited)continue;cur.visited=true;order.push(cur);
      if(cur===endNode){pathEnd=cur;break}
      for(const nb of neighbors(cur.r,cur.c)){if(!nb.visited){nb.prev=cur;stack.push(nb)}}
    }
  } else if(algo==='dijkstra'){
    startNode.dist=0;
    const unvisited=[];
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)unvisited.push(grid[r][c]);
    while(unvisited.length){
      unvisited.sort((a,b)=>a.dist-b.dist);
      const cur=unvisited.shift();
      if(cur.dist===Infinity)break;
      cur.visited=true;order.push(cur);
      if(cur===endNode){pathEnd=cur;break}
      for(const nb of neighbors(cur.r,cur.c)){
        if(!nb.visited&&cur.dist+1<nb.dist){nb.dist=cur.dist+1;nb.prev=cur}
      }
    }
  } else if(algo==='astar'){
    startNode.g=0;startNode.f=heuristic(startNode,endNode);
    const open=[startNode];const closed=new Set();
    while(open.length){
      open.sort((a,b)=>a.f-b.f);
      const cur=open.shift();
      if(closed.has(cur))continue;
      closed.add(cur);cur.visited=true;order.push(cur);
      if(cur===endNode){pathEnd=cur;break}
      for(const nb of neighbors(cur.r,cur.c)){
        if(closed.has(nb))continue;
        const ng=cur.g+1;
        if(ng<nb.g||nb.g===0){nb.g=ng;nb.h=heuristic(nb,endNode);nb.f=nb.g+nb.h;nb.prev=cur;if(!open.includes(nb))open.push(nb)}
      }
    }
  } else if(algo==='greedy'){
    startNode.h=heuristic(startNode,endNode);
    const open=[startNode];const visited=new Set();
    while(open.length){
      open.sort((a,b)=>a.h-b.h);
      const cur=open.shift();if(visited.has(cur))continue;visited.add(cur);cur.visited=true;order.push(cur);
      if(cur===endNode){pathEnd=cur;break}
      for(const nb of neighbors(cur.r,cur.c)){if(!visited.has(nb)){nb.h=heuristic(nb,endNode);nb.prev=cur;open.push(nb)}}
    }
  }

  const t1=performance.now();
  const ms=Math.round(t1-t0)+'ms';
  const batchSize=speed<=10?8:speed<=30?3:1;
  for(let i=0;i<order.length;i++){
    if(i%batchSize===0)await delay(speed/10);
    const node=order[i];
    if(node!==startNode&&node!==endNode)node.el.className='cell visited';
    if(i%10===0)setStats(i+1,0,ms);
  }
  setStats(order.length,0,ms);

  const path=[];let cur=pathEnd;
  while(cur){path.unshift(cur);cur=cur.prev}
  for(let i=0;i<path.length;i++){
    await delay(speed*1.5);
    const node=path[i];
    if(node!==startNode&&node!==endNode)node.el.className='cell path';
    setStats(order.length,i+1,ms);
  }
  if(!pathEnd)setStats(order.length,'—',ms);
  isRunning=false;btn.disabled=false;btn.textContent='▶ RUN';
}

function generateMaze(){
  if(isRunning)return;
  resetGrid();
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const cell=grid[r][c];
      const isS=startNode&&startNode.r===r&&startNode.c===c;
      const isE=endNode&&endNode.r===r&&endNode.c===c;
      if(!isS&&!isE&&Math.random()<0.3){cell.wall=true;cell.el.className='cell wall';}
    }
  }
  if(startNode){startNode.wall=false;startNode.el.className='cell start';}
  if(endNode){endNode.wall=false;endNode.el.className='cell end';}
}

document.addEventListener('mouseup',()=>{mouseDown=false});
document.addEventListener('mouseleave',()=>{mouseDown=false});
window.addEventListener('resize',()=>{if(!isRunning)initGrid()});
initGrid();
</script>
</body>
</html>
